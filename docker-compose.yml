version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/banksaathi
      - REDIS_URL=redis://redis:6379/0
      - YONO_MOCK_BASE_URL=http://yono-mock:8002
    depends_on:
      - postgres
      - redis
      - chromadb
    networks:
      - banksaathi-net

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=banksaathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banksaathi-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - banksaathi-net

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - banksaathi-net

  yono-mock:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: uvicorn scripts.yono_mock_server:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    networks:
      - banksaathi-net

networks:
  banksaathi-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
